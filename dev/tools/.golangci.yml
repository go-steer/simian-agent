# golangci-lint v2 config for simian-agent.
#
# Conservative starting set: keeps the noise low while catching real bugs.
# Add stricter linters (revive, depguard, exhaustruct, etc.) once the
# baseline is clean and we have a feel for what's worth enforcing.
#
# Run with:   dev/tools/lint-go
# Auto-fix:   dev/tools/lint-go --fix

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    # Bug-finders we never want to silence.
    - errcheck       # unchecked errors
    - govet          # core vet rules
    - ineffassign    # ineffectual assignments
    - staticcheck    # massive bug+style ruleset (now includes stylecheck + gosimple)
    - unused         # dead code

    # Quality-of-life.
    - misspell       # common typos in identifiers/comments
    - unconvert      # unnecessary type conversions
    - unparam        # unused function parameters
    - gocritic       # opinionated extra rules; many useful, low false-positive

    # Compliance.
    # goheader is intentionally disabled until the bulk-header PR lands —
    # see chore/license-headers. The template block below stays in place so
    # re-enabling is a one-line uncomment.
    # - goheader       # enforces the Apache 2.0 boilerplate on every .go file

    # Security.
    - gosec          # OWASP-style checks (nosec via // #nosec)

  exclusions:
    # Generated code shouldn't fail the lint.
    generated: lax
    presets:
      - common-false-positives
      - legacy
    rules:
      # Tests can be looser about errcheck (eg. defer f.Close()) and
      # have permission to use weak random / hardcoded creds.
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unparam
  settings:
    errcheck:
      # Noise patterns where checking the error has no useful action:
      # writing to stderr for a diagnostic, closing a file in defer,
      # or best-effort cleanup of a temp file. The `_ =` boilerplate
      # is worse than the missed check here.
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (*os.File).Close
        - os.Remove
    gocritic:
      disabled-checks:
        # "ifElseChain" pushes us toward switch statements that aren't
        # always clearer; let the author choose.
        - ifElseChain
        # commentFormatting is noisy for // TODO style markers.
        - commentFormatting
    gosec:
      excludes:
        # G104 (errcheck) is already covered by errcheck linter.
        - G104
        # G306 (WriteFile permissions): we deliberately use 0o644 for
        # scaffolded files so they behave like normal repo files.
        - G306
    goheader:
      # Enforced on every .go file. {{ YEAR-RANGE }} accepts a single
      # year or a range (e.g. "2026" or "2026-2027"); files added in
      # 2026 say "2026" and stale ones can be bumped to "2026-2027" on
      # first edit. Keep in sync with dev/tools/add-license-headers
      # and the LICENSE appendix.
      template: |-
        Copyright {{ YEAR-RANGE }} Google LLC

        Licensed under the Apache License, Version 2.0 (the "License");
        you may not use this file except in compliance with the License.
        You may obtain a copy of the License at

            http://www.apache.org/licenses/LICENSE-2.0

        Unless required by applicable law or agreed to in writing, software
        distributed under the License is distributed on an "AS IS" BASIS,
        WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
        See the License for the specific language governing permissions and
        limitations under the License.

formatters:
  enable:
    - gofmt          # canonical formatting
    - goimports      # import grouping + missing imports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/go-steer/simian-agent

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
