---
apiVersion: v1
kind: Namespace
metadata:
  name: simian-system
  labels:
    app.kubernetes.io/name: simian-agent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simian-controller
  namespace: simian-system
  labels:
    app.kubernetes.io/name: simian-agent
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: simian-agent
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: simian-agent
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: simian-controller
      containers:
        - name: controller
          image: simian-agent:0.1.0-dev
          imagePullPolicy: IfNotPresent
          args:
            - serve
            - --mcp-addr=:8081
            - --eligible-namespace=online-boutique
            # Add additional --eligible-namespace flags here.
          env:
            # Vertex / ADC (default). Comment these out and uncomment GEMINI_API_KEY
            # if you prefer the Gemini Developer API.
            - name: GOOGLE_GENAI_USE_VERTEXAI
              value: "true"
            - name: GOOGLE_CLOUD_PROJECT
              valueFrom:
                configMapKeyRef:
                  name: simian-config
                  key: googleCloudProject
            - name: VERTEX_LOCATION
              valueFrom:
                configMapKeyRef:
                  name: simian-config
                  key: vertexLocation
            # - name: GEMINI_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: simian-llm
            #       key: geminiApiKey
          ports:
            - name: mcp
              containerPort: 8081
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: simian-controller
  namespace: simian-system
  labels:
    app.kubernetes.io/name: simian-agent
    app.kubernetes.io/component: controller
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: simian-agent
    app.kubernetes.io/component: controller
  ports:
    - name: mcp
      port: 8081
      targetPort: mcp
      protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: simian-config
  namespace: simian-system
data:
  googleCloudProject: gke-demos-345619
  vertexLocation: us-central1
