# Default values for the simian Helm chart.

image:
  # Published by .github/workflows/release.yml on each `v*` tag push.
  repository: ghcr.io/go-steer/simian-agent
  # Empty default falls back to .Chart.AppVersion ("0.1.3-dev") in the
  # Deployment template, so chart bumps automatically pick up the matching
  # image tag without flipping this field.
  tag: ""
  pullPolicy: IfNotPresent

# Static eligible-namespace allowlist. When empty, the controller falls back
# to annotation-based lookup (`simian.chaos/eligible="true"`), which is the
# preferred mode for installations that use `simian arena create`. Set this
# only when you want to bypass annotation lookup entirely.
eligibleNamespaces: []

# M2 Part A: provisioner subsystem. When enabled, ships:
#   - simian-provisioner ServiceAccount + ClusterRole (cluster-scoped: ns + RB)
#   - ValidatingAdmissionPolicy backstop enforcing:
#       * provisioner-SA ns CREATE/UPDATE requires simian.chaos/eligible="true"
#       * provisioner-SA RoleBinding granting chaos SA may only target
#         eligible namespaces
# Disable for installations where arena management is performed by an
# operator using their kubeconfig (no in-cluster provisioner workload).
provisioner:
  enabled: true

# LLM provider configuration.
llm:
  provider: gemini       # gemini | stub
  model: ""              # default: gemini-2.5-pro
  vertex:
    enabled: true
    project: gke-demos-345619
    location: us-central1
  apiKey:
    enabled: false
    # Mounted from a Kubernetes Secret named .Values.llm.apiKey.secretRef.
    secretRef: simian-llm
    secretKey: geminiApiKey

# Executor safety policy.
executor:
  durationCeiling: 15m   # hard cap per fault
  permittedTiers:        # blast-radius tiers permitted by this installation
    - namespace
    - node
  maxConcurrentFaults: 0 # 0 = no cap
  minCooldown: 0s        # per-namespace cooldown between consecutive faults
  recentFaultsCapacity: 100 # bounded ring backing get_recent_faults MCP tool

# M3: read-only topology discovery for the autonomous-mode planner.
# Powers the get_topology MCP tool and (in PR2) the plan generator.
topology:
  resync: 30s            # informer resync interval

# M3: SUT lifecycle inside the controller. When enabled, the controller's
# chaos-SA Role gains the verbs needed for the establish_baseline MCP tool
# to apply SUT manifests into eligible namespaces. Operators who keep
# 'simian sut deploy' running out-of-cluster (the default M2 path) can
# leave this false.
sutInController:
  enabled: false

# Post-M3: SUT-deploy-time injection of the Envoy fault sidecar
# (pkg/sut/envoy). When enabled, the controller's establish_baseline
# MCP tool mutates each SUT Deployment to add an Envoy sidecar +
# iptables init container, so the envoy-fault chaos engine has
# somewhere to send fault config. Per-workload opt-out is via the
# pod-template annotation simian.chaos/no-envoy-injection: "true".
#
# DEFAULT: false. The current injection model intercepts ALL inbound
# TCP on the SUT's service ports via iptables PREROUTING REDIRECT.
# Envoy speaks HTTP at L7 and does NOT understand gRPC health-probe
# payloads, so workloads with gRPC livenessProbe/readinessProbe on a
# redirected port will crash-loop after kubelet's probe failures kill
# the container. Online Boutique falls into this category for 9 of
# 12 services. Until probe rewriting (Istio's pilot-agent style) or
# an outbound-only redirect mode is implemented, only flip this to
# true for SUTs whose probes are HTTP-only or TCP-only.
#
# Other gating concerns when flipping to true: the iptables init
# container needs NET_ADMIN + runAsUser=0, so installations with a
# Pod Security Standards "restricted" enforcement on the SUT
# namespace will reject the injected pods.
#
# See README.md § "Known limitation: Envoy injection breaks gRPC
# kubelet probes" and docs/plan-dpv2-chaos-engines.md for the design
# rationale.
sutInjection:
  envoyFaults: false

# M3: autonomous-mode planning loop. When enabled the controller runs a
# tick-driven cycle: health-gate → topology snapshot → LLM plan generation
# → bounded execution under the executor's safety stage. Plans are always
# emitted (and audit-logged) before any fault is applied.
autonomous:
  enabled: false
  cycleInterval: 5m
  namespaces: []           # which arena namespaces the loop targets; required when enabled
  maxFaultsPerCycle: 3
  maxSeverityPerCycle: namespace  # highest blast tier the loop will apply: namespace | node | external
  hypothesisHint: ""       # optional soft preference passed to the LLM each cycle

# MCP server.
mcp:
  port: 8081
  serviceType: ClusterIP

# Resources.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Pod security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault
