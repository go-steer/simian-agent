{{- if .Values.provisioner.enabled -}}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: {{ .Release.Name }}-simian-eligibility-on-namespace
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:   [""]
        apiVersions: ["v1"]
        operations:  ["CREATE", "UPDATE"]
        resources:   ["namespaces"]
  matchConditions:
    - name: only-provisioner-sa
      expression: >
        request.userInfo.username == "system:serviceaccount:{{ .Release.Namespace }}:simian-provisioner"
  validations:
    - expression: >
        has(object.metadata.annotations) &&
        ("simian.chaos/eligible" in object.metadata.annotations) &&
        object.metadata.annotations["simian.chaos/eligible"] == "true"
      message: >
        Namespaces created or updated by the simian-provisioner SA must carry
        annotation simian.chaos/eligible="true".
      reason: Forbidden
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ .Release.Name }}-simian-eligibility-on-namespace
spec:
  policyName: {{ .Release.Name }}-simian-eligibility-on-namespace
  validationActions: [Deny, Audit]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: {{ .Release.Name }}-simian-chaos-sa-binding-scope
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:   ["rbac.authorization.k8s.io"]
        apiVersions: ["v1"]
        operations:  ["CREATE", "UPDATE"]
        resources:   ["rolebindings"]
  matchConditions:
    - name: only-provisioner-sa
      expression: >
        request.userInfo.username == "system:serviceaccount:{{ .Release.Namespace }}:simian-provisioner"
    - name: grants-chaos-sa
      expression: >
        has(object.subjects) &&
        object.subjects.exists(s,
          s.kind == "ServiceAccount" &&
          s.name == "simian-controller" &&
          s.namespace == "{{ .Release.Namespace }}"
        )
  validations:
    - expression: >
        has(namespaceObject.metadata.annotations) &&
        ("simian.chaos/eligible" in namespaceObject.metadata.annotations) &&
        namespaceObject.metadata.annotations["simian.chaos/eligible"] == "true"
      message: >
        RoleBindings created by simian-provisioner that grant the
        simian-controller SA may only land in namespaces annotated
        simian.chaos/eligible="true". Mark the namespace as an arena first.
      reason: Forbidden
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ .Release.Name }}-simian-chaos-sa-binding-scope
spec:
  policyName: {{ .Release.Name }}-simian-chaos-sa-binding-scope
  validationActions: [Deny, Audit]
{{- end }}
